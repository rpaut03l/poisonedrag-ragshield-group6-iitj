<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0d1b2a"/>
    </linearGradient>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto">
      <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arG" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto">
      <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#34d399"/>
    </marker>
    <marker id="arR" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto">
      <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="880" height="720" rx="16" fill="url(#bgP)"/>
  <text x="40" y="46" fill="#e2e8f0" font-size="22" font-weight="700">RAG-Shield — End-to-End Pipeline</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13">Every query flows through three independent rings before an answer is trusted</text>

  <!-- USER QUERY -->
  <rect x="320" y="92" width="240" height="48" rx="24" fill="#1e293b" stroke="#64748b"/>
  <text x="440" y="121" fill="#e2e8f0" font-size="15" text-anchor="middle" font-weight="600">USER QUERY</text>
  <line x1="440" y1="140" x2="440" y2="168" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- RETRIEVER -->
  <rect x="250" y="172" width="380" height="74" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="198" fill="#dbeafe" font-size="15" text-anchor="middle" font-weight="700">Retriever</text>
  <text x="440" y="218" fill="#bfdbfe" font-size="11" text-anchor="middle">top-K docs from KB (clean + poison)</text>
  <text x="270" y="238" fill="#64748b" font-size="10">demo: TF-IDF (sklearn)</text>
  <text x="610" y="238" fill="#64748b" font-size="10" text-anchor="end">live: FAISS + sentence-transformers</text>
  <line x1="440" y1="246" x2="440" y2="274" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- RING 1 -->
  <rect x="250" y="278" width="380" height="66" rx="12" fill="#11203b" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="284" cy="311" r="14" fill="#1d4ed8"/><text x="284" y="316" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">1</text>
  <text x="310" y="305" fill="#dbeafe" font-size="14" font-weight="700">Ring 1 · Ingest Guard</text>
  <text x="310" y="325" fill="#93c5fd" font-size="11">perplexity · pattern · outlier  →  blocked docs logged &amp; dropped</text>
  <line x1="440" y1="344" x2="440" y2="372" stroke="#34d399" stroke-width="2.5" marker-end="url(#arG)"/>

  <!-- RING 2 -->
  <rect x="250" y="376" width="380" height="66" rx="12" fill="#0f2a1e" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="284" cy="409" r="14" fill="#15803d"/><text x="284" y="414" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">2</text>
  <text x="310" y="403" fill="#dcfce7" font-size="14" font-weight="700">Ring 2 · Retrieval Scorer</text>
  <text x="310" y="423" fill="#86efac" font-size="11">provenance + consistency  →  trust re-rank; low-trust docs dropped</text>
  <line x1="440" y1="442" x2="440" y2="470" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- RING 3 -->
  <rect x="250" y="474" width="380" height="120" rx="12" fill="#1e1633" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="284" cy="503" r="14" fill="#7c3aed"/><text x="284" y="508" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">3</text>
  <text x="310" y="507" fill="#ede9fe" font-size="14" font-weight="700">Ring 3 · Cross-LLM Consensus</text>
  <text x="310" y="527" fill="#c4b5fd" font-size="11">3 models vote on the same context</text>
  <!-- agree path -->
  <rect x="296" y="540" width="150" height="40" rx="8" fill="#064e3b" stroke="#34d399"/>
  <text x="371" y="558" fill="#a7f3d0" font-size="11" text-anchor="middle">agree?  ── yes ──▶</text>
  <text x="371" y="573" fill="#34d399" font-size="11" text-anchor="middle" font-weight="700">return answer</text>
  <!-- disagree path -->
  <rect x="456" y="540" width="158" height="40" rx="8" fill="#3a2417" stroke="#fbbf24"/>
  <text x="535" y="556" fill="#fde68a" font-size="10" text-anchor="middle">disagree → drop suspect</text>
  <text x="535" y="571" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">→ re-retrieve → re-vote</text>
  <!-- loop arrow back to retriever -->
  <path d="M614 560 H660 V210 H636" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arR)"/>
  <text x="668" y="385" fill="#fbbf24" font-size="10" transform="rotate(90 668 385)">re-retrieve loop</text>

  <line x1="371" y1="594" x2="371" y2="624" stroke="#34d399" stroke-width="2.5" marker-end="url(#arG)"/>
  <!-- shift trusted answer under the agree path -->
  <rect x="250" y="628" width="380" height="60" rx="12" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="440" y="654" fill="#34d399" font-size="16" text-anchor="middle" font-weight="700">TRUSTED ANSWER</text>
  <text x="440" y="675" fill="#a7f3d0" font-size="10.5" text-anchor="middle">+ full per-ring trace (powers the Forensic Explorer page)</text>
</svg>
